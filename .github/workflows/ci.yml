name: CI - Lint and Tests

on:
  pull_request:
    branches: ['**']

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  unit-tests:
    name: Run Unit Tests (only on PR to main)
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  e2e-tests:
    name: Run E2E Tests (only on PR to main)
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skillswap_test
      NODE_ENV: test
      ENV_FILE: .env.test.local
      HASH_SALT: 10
      JWT_ACCESS_SECRET: 24f92b5cab52dcb3a6202983a8dcc0cc51d1c10050081b8b87ebf9fdeee9b7dc
      JWT_REFRESH_SECRET: c45384c565425dcdc2ae464588dd46684ead6259db1985e02d3d2734cd4ab955
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@skillswap.ru
      ADMIN_PASSWORD: admin123
      SEED_USER_PASSWORD: user123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        run: npm run test:e2e
